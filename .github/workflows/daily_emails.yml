name: Resume Tracker — Daily Emails (UK time)

# GitHub Actions uses UTC. UK summer = BST (UTC+1).
# To convert:  BST hour - 1 = UTC hour
#
#  7:00 AM BST = 06:00 UTC  → morning motivation
#  9:00 AM BST = 08:00 UTC  → check
# 12:00 PM BST = 11:00 UTC  → midday check  (12 PM noon — uses midday command)
#  3:00 PM BST = 14:00 UTC  → check
#  6:00 PM BST = 17:00 UTC  → check
#  9:00 PM BST = 20:00 UTC  → check
# 12:00 AM BST = 23:00 UTC  → midnight summary  (midnight = 11 PM UTC)

on:
  schedule:
    - cron: '0 6  * * *'   # 07:00 AM BST — Morning motivation
    - cron: '0 8  * * *'   # 09:00 AM BST — Progress check
    - cron: '0 11 * * *'   # 12:00 PM BST — Midday check  ← exact noon UK
    - cron: '0 14 * * *'   # 03:00 PM BST — Progress check
    - cron: '0 17 * * *'   # 06:00 PM BST — Progress check
    - cron: '0 20 * * *'   # 09:00 PM BST — Progress check
    - cron: '0 23 * * *'   # 12:00 AM BST — Midnight summary  ← exact midnight UK
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  send-email:
    runs-on: ubuntu-latest

    env:
      EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r Resume/requirements.txt

      # 07:00 AM BST — rich morning motivation email
      - name: 7 AM BST — Morning motivation
        if: github.event.schedule == '0 6  * * *' || github.event_name == 'workflow_dispatch'
        run: python Resume/resume_tracker.py morning

      # 09:00 AM / 03:00 PM / 06:00 PM / 09:00 PM BST — progress check
      - name: Progress check (9 AM / 3 PM / 6 PM / 9 PM BST)
        if: >
          github.event.schedule == '0 8  * * *' ||
          github.event.schedule == '0 14 * * *' ||
          github.event.schedule == '0 17 * * *' ||
          github.event.schedule == '0 20 * * *'
        run: python Resume/resume_tracker.py check

      # 12:00 PM BST — dedicated midday progress email (noon UK time)
      - name: 12 PM BST — Midday check
        if: github.event.schedule == '0 11 * * *'
        run: python Resume/resume_tracker.py midday

      # 12:00 AM BST — end-of-day summary (midnight UK time)
      - name: Midnight BST — Final summary
        if: github.event.schedule == '0 23 * * *'
        run: python Resume/resume_tracker.py midnight
