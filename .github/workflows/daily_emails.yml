name: Resume Tracker — Daily Emails (UK time)

# PRIMARY TRIGGER: cron-job.org calls the GitHub API workflow_dispatch with
# an "email_type" input at the exact UK time. This gives near-perfect timing.
#
# FALLBACK: GitHub Actions cron (may be delayed 15-60 min — kept as backup).
#
# UK summer = BST (UTC+1). GitHub cron uses UTC.
#  7:00 AM BST = 06:00 UTC
#  9:00 AM BST = 08:00 UTC
# 12:00 PM BST = 11:00 UTC
#  3:00 PM BST = 14:00 UTC
#  6:00 PM BST = 17:00 UTC
#  9:00 PM BST = 20:00 UTC
# 12:00 AM BST = 23:00 UTC

on:
  workflow_dispatch:
    inputs:
      email_type:
        description: 'Email type: morning / check / midday / midnight'
        required: false
        default: 'morning'

  schedule:
    - cron: '0 6  * * *'   # 07:00 AM BST — Morning motivation   (fallback)
    - cron: '0 8  * * *'   # 09:00 AM BST — Progress check       (fallback)
    - cron: '0 11 * * *'   # 12:00 PM BST — Midday check         (fallback)
    - cron: '0 14 * * *'   # 03:00 PM BST — Progress check       (fallback)
    - cron: '0 17 * * *'   # 06:00 PM BST — Progress check       (fallback)
    - cron: '0 20 * * *'   # 09:00 PM BST — Progress check       (fallback)
    - cron: '0 23 * * *'   # 12:00 AM BST — Midnight summary     (fallback)

jobs:
  send-email:
    runs-on: ubuntu-latest

    env:
      EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Triggered by cron-job.org via workflow_dispatch ──────────────────────
      - name: Dispatch — Morning (cron-job.org)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.email_type == 'morning'
        run: python resume_tracker.py morning

      - name: Dispatch — Check (cron-job.org)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.email_type == 'check'
        run: python resume_tracker.py check

      - name: Dispatch — Midday (cron-job.org)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.email_type == 'midday'
        run: python resume_tracker.py midday

      - name: Dispatch — Midnight (cron-job.org)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.email_type == 'midnight'
        run: python resume_tracker.py midnight

      # ── GitHub Actions cron fallback (if cron-job.org ever misses) ──────────
      - name: Cron fallback — Morning
        if: github.event.schedule == '0 6  * * *'
        run: python resume_tracker.py morning

      - name: Cron fallback — Check (9 AM / 3 PM / 6 PM / 9 PM)
        if: >
          github.event.schedule == '0 8  * * *' ||
          github.event.schedule == '0 14 * * *' ||
          github.event.schedule == '0 17 * * *' ||
          github.event.schedule == '0 20 * * *'
        run: python resume_tracker.py check

      - name: Cron fallback — Midday
        if: github.event.schedule == '0 11 * * *'
        run: python resume_tracker.py midday

      - name: Cron fallback — Midnight
        if: github.event.schedule == '0 23 * * *'
        run: python resume_tracker.py midnight
